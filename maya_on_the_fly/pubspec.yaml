name: maya_on_the_fly
description: AI-assisted document creation with multi-agent chat, Git version control, and multi-format export.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.0

  # Navigation
  go_router: ^12.0.0

  # Database
  sqflite: ^2.3.0
  sqlcipher_flutter_libs: ^0.6.0
  path_provider: ^2.1.0
  path: ^1.8.0

  # Secure storage & auth
  flutter_secure_storage: ^8.0.0
  local_auth: ^2.1.0
  # Markdown editor & preview
  flutter_markdown: ^0.6.18
  markdown: ^7.1.0

  # AI / HTTP
  http: ^1.1.0
  web_socket_channel: ^2.4.0

  # Git
  git2dart: ^0.5.3

  # Export
  pdf: ^3.10.0
  printing: ^5.11.0
  share_plus: ^7.2.0

  # OAuth / Cloud
  google_sign_in: ^6.1.0

  # Charts
  fl_chart: ^0.65.0

  # UI
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.8
  shimmer: ^3.0.0

  # Encryption
  cryptography: ^2.7.0

  # Utilities
  uuid: ^4.1.0
  json_annotation: ^4.8.0
  intl: ^0.18.0
  collection: ^1.17.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  image: ^4.0.0

  # Code generation
  json_serializable: ^6.7.0

  # Testing
  sqflite_common_ffi: ^2.3.0
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0
  mockito: ^5.4.0



flutter:
  uses-material-design: true

  assets:
    - assets/templates/
