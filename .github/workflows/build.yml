name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: maya_on_the_fly

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - name: Patch Flutter Gradle plugin for Gradle 7 compatibility
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          GRADLE_DIR="$FLUTTER_DIR/packages/flutter_tools/gradle"
          # Downgrade Kotlin version from 2.2.20 to 1.9.22 for Gradle 7.6.3 kotlin-dsl compat
          sed -i 's/kotlin("jvm") version "2\.2\.20"/kotlin("jvm") version "1.9.22"/' "$GRADLE_DIR/build.gradle.kts"

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: maya_on_the_fly/build/app/outputs/flutter-apk/*.apk

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - run: flutter build ipa --release --no-codesign

      - uses: actions/upload-artifact@v6
        with:
          name: release-ipa
          path: maya_on_the_fly/build/ios/ipa/*.ipa

  release:
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-apk
          path: artifacts

      - uses: actions/download-artifact@v7
        with:
          name: release-ipa
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
