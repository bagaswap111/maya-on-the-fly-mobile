name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: maya_on_the_fly

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - name: Pre-compile Flutter Gradle plugin (bundle AGP)
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          GRADLE_DIR="$FLUTTER_DIR/packages/flutter_tools/gradle"
          # Change compileOnly to implementation so AGP is bundled into the plugin JAR
          sed -i 's/compileOnly("com.android.tools.build/implementation("com.android.tools.build/' "$GRADLE_DIR/build.gradle.kts"
          # Use the Android project's Gradle wrapper targeting the Flutter plugin
          android/gradlew -p "$GRADLE_DIR" publishToMavenLocal
        timeout-minutes: 10

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: maya_on_the_fly/build/app/outputs/flutter-apk/*.apk

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - run: flutter build ipa --release --no-codesign

      - uses: actions/upload-artifact@v6
        with:
          name: release-ipa
          path: maya_on_the_fly/build/ios/ipa/*.ipa

  release:
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-apk
          path: artifacts

      - uses: actions/download-artifact@v7
        with:
          name: release-ipa
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
