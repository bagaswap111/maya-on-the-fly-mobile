name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: maya_on_the_fly

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - name: Patch Flutter Gradle plugin for Gradle 7 compatibility
        run: |
          FLUTTER_DIR=$(dirname $(dirname $(which flutter)))
          GRADLE_DIR="$FLUTTER_DIR/packages/flutter_tools/gradle"
          # Clean any artifacts from previous patch runs
          rm -f "$GRADLE_DIR/gradle.properties"
          # Gradle 7.6.3 kotlin-dsl sets languageVersion=1.4 by default.
          # Kotlin 2.x removed support for language version 1.4, so downgrade to Kotlin 1.9.22.
          sed -i 's/kotlin("jvm") version "2\.2\.20"/kotlin("jvm") version "1.9.22"/' "$GRADLE_DIR/build.gradle.kts"
          # Flutter plugin uses Kotlin 2.x compiler API (compilerOptions) which doesn't exist in 1.x.
          # Replace with 1.x API (kotlinOptions).
          sed -i 's/import org\.jetbrains\.kotlin\.gradle\.dsl\.JvmTarget/\/\/ JvmTarget removed for 1.x compat/' "$GRADLE_DIR/build.gradle.kts"
          sed -i 's/compilerOptions {/kotlinOptions {/' "$GRADLE_DIR/build.gradle.kts"
          sed -i 's/jvmTarget\.set(JvmTarget\.JVM_11)/jvmTarget = "11"/' "$GRADLE_DIR/build.gradle.kts"

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: maya_on_the_fly/build/app/outputs/flutter-apk/*.apk

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - run: flutter build ipa --release --no-codesign

      - uses: actions/upload-artifact@v6
        with:
          name: release-ipa
          path: maya_on_the_fly/build/ios/ipa/*.ipa

  release:
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-apk
          path: artifacts

      - uses: actions/download-artifact@v7
        with:
          name: release-ipa
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
