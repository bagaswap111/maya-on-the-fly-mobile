name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: maya_on_the_fly

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - name: Patch Flutter Gradle plugin for Gradle 8.3 compatibility
        run: |
          # Gradle 8.3 kotlin-dsl uses language version 1.8, compatible with Kotlin 2.2.20.
          # Flutter plugin compiles cleanly on Gradle 8.3+ — no patches needed.
          echo "Gradle 8.3+ detected; no Flutter plugin patches required"

      - run: flutter build apk --release

      - uses: actions/upload-artifact@v6
        with:
          name: release-apk
          path: maya_on_the_fly/build/app/outputs/flutter-apk/*.apk

  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.4
          channel: stable

      - run: flutter pub get

      - run: flutter build ipa --release --no-codesign

      - uses: actions/upload-artifact@v6
        with:
          name: release-ipa
          path: maya_on_the_fly/build/ios/ipa/*.ipa

  release:
    needs: [build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-apk
          path: artifacts

      - uses: actions/download-artifact@v7
        with:
          name: release-ipa
          path: artifacts

      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
